# Central SonarQube settings consumed by setup-sonarqube.ps1.
# For Unity/.NET projects, SonarScanner for .NET must run through begin -> build -> end.

sonar.projectKey=unity-multiplayer-game
sonar.projectName=DevProject
sonar.projectVersion=1.0.0
sonar.host.url=http://localhost:9000
sonar.sourceEncoding=UTF-8

# Scanner for .NET v8+ analyzes additional languages automatically when scanAll is enabled.
# Keep it on so the Supabase TypeScript LLM proxy is part of the same project analysis.
sonar.scanner.scanAll=true
sonar.verbose=true
sonar.dotnet.excludeTestProjects=false

# Import the generic SonarQube coverage report already produced by Unity Code Coverage.
sonar.coverageReportPaths=CodeCoverage/Report/SonarQube.xml

# Keep multi-language analysis focused on first-party code and backend logic.
sonar.exclusions=**/Library/**,**/Temp/**,**/Logs/**,**/obj/**,**/node_modules/**,**/.git/**,**/.sonarqube/**,**/.claude/**,**/.codex/**,**/.cursor/**,**/.kimi/**,**/.opencode/**,**/.serena/**,**/.sisyphus/**,**/.vscode/**,**/CodeCoverage/**,**/Docs/**,**/ProjectSettings/**,**/UserSettings/**,**/Tools/**,**/scripts/**,**/*.meta,**/*.asset,**/*.prefab,**/*.unity,**/*.mat,**/*.anim,**/*.controller,**/*.inputactions,**/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.psd,**/*.tga,**/*.fbx,**/*.wav,**/*.mp3,**/*.dll,**/*.exe,Assets/StarterAssets/**,Assets/Network_Game/ParticlePack/**

# Third-party/runtime support code should not dilute the coverage target for gameplay and dialogue logic.
sonar.coverage.exclusions=Assets/StarterAssets/**/*.cs,Assets/Network_Game/ParticlePack/**/*.cs

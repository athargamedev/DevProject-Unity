services:
  lmstudio-proxy:
    image: node:20-alpine
    container_name: sourcebot-lmstudio-proxy
    command: ["node", "/app/lmstudio-proxy.mjs"]
    volumes:
      - ./lmstudio-proxy.mjs:/app/lmstudio-proxy.mjs:ro
    environment:
      - TARGET_BASE_URL=http://host.docker.internal:7002
      - PORT=8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  sourcebot:
    build:
      context: ../sourcebot
      dockerfile: Dockerfile
    image: sourcebot-local-unity:latest
    container_name: sourcebot-ml-agents
    depends_on:
      - lmstudio-proxy
    ports:
      - "127.0.0.1:8090:3000"
    volumes:
      - ./runtime-v4152:/data
      - ./config.json:/data/config.json:ro
      - ../../:/repos/ml-agents:ro
      - ..:/repos/devproject:ro
    environment:
      - CONFIG_PATH=/data/config.json
      - FORCE_ENABLE_ANONYMOUS_ACCESS=true
      - AUTH_URL=${AUTH_URL:-http://localhost:8090}
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET in sourcebot/.env}
      - SOURCEBOT_ENCRYPTION_KEY=${SOURCEBOT_ENCRYPTION_KEY:?Set SOURCEBOT_ENCRYPTION_KEY in sourcebot/.env}
      - LM_STUDIO_TOKEN=${LM_STUDIO_TOKEN:?Set LM_STUDIO_TOKEN in sourcebot/.env}
      - SOURCEBOT_EE_LICENSE_KEY=${SOURCEBOT_EE_LICENSE_KEY:-}
      - ALWAYS_INDEX_FILE_PATTERNS=DevProject/**/*.asmdef,DevProject/**/*.uxml,DevProject/**/*.uss,DevProject/**/*.json,DevProject/**/*.yaml,DevProject/**/*.yml,DevProject/**/*.shader,DevProject/**/*.shadergraph,DevProject/**/*.compute,DevProject/**/*.hlsl,DevProject/**/*.cginc,DevProject/**/*.unity,DevProject/**/*.prefab,DevProject/ProjectSettings/**
      - SOURCEBOT_LOG_LEVEL=info
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: sourcebot-network
